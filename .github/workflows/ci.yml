name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install mypy pydantic openai types-PyYAML
      - run: mypy --ignore-missing-imports agents/ utils/ models/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # gitleaks needs full history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit pip-audit semgrep

      - name: Bandit — Python code scan
        run: bandit -r agents/ utils/ models/ -ll -q

      - name: pip-audit — dependency CVEs
        run: pip-audit -r requirements.txt

      - name: Semgrep — SAST (python + secrets rulesets)
        run: semgrep scan --config p/python --config p/secrets --error --quiet
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}   # optional, remove if public repo

      - name: Gitleaks — secret leak detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # required for private repos
